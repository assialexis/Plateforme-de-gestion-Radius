<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <title>Verification OTP - WiFi Zone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .logo-icon svg { width: 28px; height: 28px; fill: #60a5fa; }
        .logo h1 { font-size: 20px; font-weight: 700; color: #fff; }
        .logo p { font-size: 13px; color: #94a3b8; margin-top: 2px; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 32px 28px;
        }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .step-dot {
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            transition: background 0.3s;
        }
        .step-dot.active { background: #3b82f6; }
        .step-dot.done { background: #22c55e; }
        .step-title {
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .step-desc {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .phone-input {
            display: flex;
            gap: 0;
        }
        .phone-prefix {
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #94a3b8;
            font-size: 15px;
            white-space: nowrap;
        }
        .phone-prefix input {
            width: 40px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 15px;
        }
        input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .phone-input input[type="tel"] {
            border-radius: 0 12px 12px 0;
        }
        input:focus { border-color: #3b82f6; }
        input::placeholder { color: #475569; }
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .otp-input:focus { border-color: #3b82f6; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-link {
            background: transparent;
            color: #60a5fa;
            font-size: 13px;
            margin-top: 12px;
        }
        .btn-link:hover { color: #93bbfd; }
        .btn-link:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-box {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #fca5a5;
            display: none;
        }
        .error-box.show { display: block; }
        .success-box {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            font-size: 14px;
            color: #86efac;
            display: none;
        }
        .success-box.show { display: block; }
        .timer {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-top: 16px;
        }
        .timer span { color: #f59e0b; font-weight: 600; }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .voucher-info {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .voucher-info strong { color: #e2e8f0; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1>Verification OTP</h1>
            <p>Confirmez votre identite pour vous connecter</p>
        </div>

        <div class="card">
            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
            </div>

            <!-- Error Box -->
            <div class="error-box" id="error-box"></div>

            <!-- Step 1: Phone Number -->
            <div id="step-phone">
                <h2 class="step-title">Numero de telephone</h2>
                <p class="step-desc">Entrez votre numero pour recevoir le code de verification</p>

                <div class="voucher-info" id="voucher-info">
                    Ticket: <strong id="display-voucher"></strong>
                </div>

                <div class="input-group">
                    <label>Numero de telephone</label>
                    <div class="phone-input">
                        <div class="phone-prefix">
                            +<input type="text" id="country-code" value="229" maxlength="4">
                        </div>
                        <input type="tel" id="phone-input" placeholder="96 00 00 00" autofocus>
                    </div>
                </div>

                <button class="btn btn-primary" id="btn-send" onclick="sendOtp()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                    Envoyer le code
                </button>
            </div>

            <!-- Step 2: OTP Code -->
            <div id="step-otp" class="hidden">
                <h2 class="step-title">Code de verification</h2>
                <p class="step-desc">Entrez le code recu par SMS au <strong id="display-phone"></strong></p>

                <div class="otp-inputs" id="otp-container"></div>

                <div class="timer" id="timer-box">
                    Code valide pendant <span id="timer-display">5:00</span>
                </div>

                <button class="btn btn-primary" id="btn-verify" onclick="verifyOtp()" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    Verifier
                </button>

                <button class="btn btn-link" id="btn-resend" onclick="sendOtp()" disabled>
                    Renvoyer le code
                </button>
            </div>

            <!-- Step 3: Success -->
            <div id="step-success" class="hidden">
                <div class="success-box show">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" style="margin: 0 auto 12px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <div style="font-size:16px; font-weight:600; color:#86efac; margin-bottom:6px;">Verification reussie!</div>
                    <div>Connexion en cours...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Parse URL parameters
    var params = new URLSearchParams(window.location.search);
    var ADMIN_ID = params.get('admin_id') || '';
    var USERNAME = params.get('username') || '';
    var PASSWORD = params.get('password') || USERNAME;
    var CLIENT_IP = params.get('ip') || '';
    var CLIENT_MAC = params.get('mac') || '';
    var API_URL = params.get('api_url') || '';
    var OTP_LENGTH = 6;
    var expiresIn = 300;
    var timerInterval = null;
    var currentPhone = '';

    // Display voucher info
    document.getElementById('display-voucher').textContent = USERNAME || '-';

    // Validate required params
    if (!ADMIN_ID || !USERNAME || !API_URL) {
        showError('Parametres manquants. Retournez a la page de connexion.');
        document.getElementById('btn-send').disabled = true;
    }

    // Charger la config publique (country_code, otp_length)
    if (ADMIN_ID && API_URL) {
        fetch(API_URL + '/otp/public-config?admin_id=' + ADMIN_ID)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success && data.data) {
                    if (data.data.country_code) {
                        document.getElementById('country-code').value = data.data.country_code;
                    }
                    if (data.data.otp_length) {
                        OTP_LENGTH = parseInt(data.data.otp_length);
                    }
                }
            })
            .catch(function() {});
    }

    // Update step indicators
    function updateSteps(step) {
        for (var i = 1; i <= 3; i++) {
            var dot = document.getElementById('dot-' + i);
            dot.className = 'step-dot';
            if (i < step) dot.className = 'step-dot done';
            if (i === step) dot.className = 'step-dot active';
        }
    }
    updateSteps(1);

    function showError(msg) {
        var box = document.getElementById('error-box');
        box.textContent = msg;
        box.className = 'error-box show';
    }

    function hideError() {
        document.getElementById('error-box').className = 'error-box';
    }

    function setLoading(btn, loading) {
        if (loading) {
            btn.disabled = true;
            btn.dataset.originalHtml = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div> Chargement...';
        } else {
            btn.disabled = false;
            btn.innerHTML = btn.dataset.originalHtml || btn.innerHTML;
        }
    }

    // Create OTP input fields
    function createOtpInputs(length) {
        OTP_LENGTH = length;
        var container = document.getElementById('otp-container');
        container.innerHTML = '';
        for (var i = 0; i < length; i++) {
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'otp-input';
            input.maxLength = 1;
            input.inputMode = 'numeric';
            input.pattern = '[0-9]';
            input.dataset.index = i;

            input.addEventListener('input', function(e) {
                var val = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = val;
                if (val && e.target.dataset.index < length - 1) {
                    var next = container.children[parseInt(e.target.dataset.index) + 1];
                    if (next) next.focus();
                }
                checkOtpComplete();
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !e.target.value && e.target.dataset.index > 0) {
                    var prev = container.children[parseInt(e.target.dataset.index) - 1];
                    if (prev) { prev.focus(); prev.value = ''; }
                }
            });

            input.addEventListener('paste', function(e) {
                e.preventDefault();
                var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                for (var j = 0; j < Math.min(paste.length, length); j++) {
                    container.children[j].value = paste[j];
                }
                checkOtpComplete();
                var lastIdx = Math.min(paste.length, length) - 1;
                if (container.children[lastIdx]) container.children[lastIdx].focus();
            });

            container.appendChild(input);
        }
    }

    function getOtpValue() {
        var inputs = document.getElementById('otp-container').children;
        var code = '';
        for (var i = 0; i < inputs.length; i++) {
            code += inputs[i].value;
        }
        return code;
    }

    function checkOtpComplete() {
        var code = getOtpValue();
        document.getElementById('btn-verify').disabled = code.length !== OTP_LENGTH;
    }

    // Timer
    function startTimer(seconds) {
        if (timerInterval) clearInterval(timerInterval);
        var remaining = seconds;
        var display = document.getElementById('timer-display');
        var resendBtn = document.getElementById('btn-resend');
        resendBtn.disabled = true;

        timerInterval = setInterval(function() {
            remaining--;
            var min = Math.floor(remaining / 60);
            var sec = remaining % 60;
            display.textContent = min + ':' + (sec < 10 ? '0' : '') + sec;

            if (remaining <= 0) {
                clearInterval(timerInterval);
                display.textContent = '0:00';
                resendBtn.disabled = false;
                document.getElementById('timer-box').innerHTML = 'Code expire. <span style="color:#f59e0b;">Renvoyez un nouveau code.</span>';
            }
        }, 1000);
    }

    // Send OTP
    function sendOtp() {
        hideError();
        var phoneInput = document.getElementById('phone-input');
        var countryCode = document.getElementById('country-code').value.trim();
        var phone = phoneInput.value.trim().replace(/\s/g, '');

        if (!phone) {
            showError('Veuillez entrer votre numero de telephone.');
            phoneInput.focus();
            return;
        }

        // Format phone
        var fullPhone = phone;
        if (!phone.startsWith('+') && !phone.startsWith('00')) {
            if (phone.startsWith('0')) {
                fullPhone = '+' + countryCode + phone.substring(1);
            } else {
                fullPhone = '+' + countryCode + phone;
            }
        }
        currentPhone = fullPhone;

        var btn = document.getElementById('btn-send');
        setLoading(btn, true);

        fetch(API_URL + '/otp/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                admin_id: parseInt(ADMIN_ID),
                phone: fullPhone,
                voucher_username: USERNAME,
                voucher_password: PASSWORD,
                ip: CLIENT_IP,
                mac: CLIENT_MAC,
                user_agent: navigator.userAgent,
            }),
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            setLoading(btn, false);
            if (data.success) {
                expiresIn = data.data.expires_in || 300;
                // Show OTP step
                document.getElementById('step-phone').className = 'hidden';
                document.getElementById('step-otp').className = '';
                document.getElementById('display-phone').textContent = fullPhone;
                updateSteps(2);
                createOtpInputs(OTP_LENGTH);
                startTimer(expiresIn);
                // Focus first OTP input
                setTimeout(function() {
                    var first = document.querySelector('.otp-input');
                    if (first) first.focus();
                }, 100);
            } else {
                showError(data.message || 'Erreur lors de l\'envoi du code.');
            }
        })
        .catch(function(err) {
            setLoading(btn, false);
            showError('Erreur reseau. Verifiez votre connexion.');
        });
    }

    // Verify OTP
    function verifyOtp() {
        hideError();
        var code = getOtpValue();
        if (code.length !== OTP_LENGTH) {
            showError('Entrez le code complet.');
            return;
        }

        var btn = document.getElementById('btn-verify');
        setLoading(btn, true);

        fetch(API_URL + '/otp/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                admin_id: parseInt(ADMIN_ID),
                phone: currentPhone,
                otp_code: code,
            }),
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            setLoading(btn, false);
            if (data.success) {
                if (timerInterval) clearInterval(timerInterval);
                // Show success step
                document.getElementById('step-otp').className = 'hidden';
                document.getElementById('step-success').className = '';
                updateSteps(3);
                // Redirect to MikroTik login
                var redirectUrl = data.data.redirect_url;
                if (redirectUrl) {
                    setTimeout(function() {
                        window.location.href = redirectUrl;
                    }, 1500);
                }
            } else {
                showError(data.message || 'Code invalide.');
                // Clear OTP inputs
                var inputs = document.querySelectorAll('.otp-input');
                for (var i = 0; i < inputs.length; i++) inputs[i].value = '';
                if (inputs[0]) inputs[0].focus();
                document.getElementById('btn-verify').disabled = true;
            }
        })
        .catch(function(err) {
            setLoading(btn, false);
            showError('Erreur reseau. Verifiez votre connexion.');
        });
    }

    // Enter key on phone input
    document.getElementById('phone-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendOtp();
    });
    </script>
</body>
</html>
