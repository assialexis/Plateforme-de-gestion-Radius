<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="refresh" content="2; url=$(link-orig)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>WiFi Zone - Publicite</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        var popup = '';
        function openOrig() {
            if (window.focus) popup.focus();
            location.href = unescape('$(link-orig-esc)');
        }
        function openAd() {
            location.href = unescape('$(link-redirect-esc)');
        }
        function openAdvert() {
            if (window.name != 'hotspot_advert') {
                popup = open('$(link-redirect)', 'hotspot_advert', '');
                setTimeout("openOrig()", 1000);
                return;
            }
            setTimeout("openAd()", 1000);
        }
    </script>
</head>
<body onload="openAdvert()">
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="page-card glass-card">
            <h1>Publicite</h1>
            <p class="info">Si rien ne se passe, ouvrez la <a href="$(link-redirect)" target="hotspot_advert">publicite</a> manuellement.</p>
        </div>
    </div>
    <script src="conf.js"></script>
    <script>
        if (config.theme === 'lite') document.body.classList.add('lite');
    </script>
</body>
</html>
