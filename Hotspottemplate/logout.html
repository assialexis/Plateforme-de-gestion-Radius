<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>WiFi Zone - Deconnexion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script>
        function openLogin() {
            if (window.name != 'hotspot_logout') return true;
            open('$(link-login)', '_blank', '');
            window.close();
            return false;
        }
    </script>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="page-card glass-card">
            <div class="logout-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" width="60" height="60">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
            </div>
            <h1>Deconnexion</h1>
            <p class="info">Vous etes deconnecte!</p>

            <table class="info-table">
                <tr><td>Utilisateur</td><td>$(username)</td></tr>
                <tr><td>Adresse IP</td><td>$(ip)</td></tr>
                <tr><td>Adresse MAC</td><td>$(mac)</td></tr>
                <tr><td>Temps de session</td><td><span id="uptime">$(uptime)</span></td></tr>
                $(if session-time-left)
                <tr><td>Temps restant</td><td><span id="timeleft">$(session-time-left)</span></td></tr>
                $(endif)
                <tr><td>Donnees</td><td>$(bytes-in-nice) / $(bytes-out-nice)</td></tr>
            </table>

            <form action="$(link-login)" name="login" onsubmit="return openLogin()">
                <button type="submit" class="btn-submit">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
                    </svg>
                    Se reconnecter
                </button>
            </form>
        </div>
    </div>
    <script src="conf.js"></script>
    <script>
        if (config.theme === 'lite') document.body.classList.add('lite');
    </script>
</body>
</html>
