<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>WiFi Zone - Erreur</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="page-card glass-card">
            <div class="error-icon">
                <svg viewBox="0 0 24 24" fill="currentColor" width="60" height="60">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
            </div>
            <h1>Erreur Hotspot</h1>
            <p class="info error-text">$(error)</p>
            <p class="info">
                <a href="$(link-login)" class="link">Retour a la page de connexion</a>
            </p>
        </div>
    </div>
    <script src="conf.js"></script>
    <script>
        if (config.theme === 'lite') document.body.classList.add('lite');
    </script>
</body>
</html>
